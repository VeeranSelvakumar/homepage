  });

// 🔥 SAME ADDRESS SMART SYNC (NO DUPLICATE LISTENER)

const addressMap = [
  ["currentaddress","permanentaddress"],
  ["addressline1","peraddressline1"],
  ["addressline2","peraddressline2"],
  ["currentstate","perstate"],
  ["currentdistrict","perdistrict"],
  ["subdistrict","persubdistrict"],
  ["currentpincode","perpincode"]
];

// 👉 copy function
function copyAddressValues(){
  addressMap.forEach(([src, dest])=>{
    const srcEl = document.querySelector(`[name="${src}"]`);
    const destEl = document.querySelector(`[name="${dest}"]`);
    if(srcEl && destEl){
      destEl.value = srcEl.value;
    }
  });
}

// 👉 clear function
function clearAddressValues(){
  addressMap.forEach(([_, dest])=>{
    const destEl = document.querySelector(`[name="${dest}"]`);
    if(destEl){
      destEl.value = "";
    }
  });
}

// 👉 realtime sync (ONLY ONCE attach)
addressMap.forEach(([src, dest])=>{
  const srcEl = document.querySelector(`[name="${src}"]`);
  const destEl = document.querySelector(`[name="${dest}"]`);

  if(srcEl && destEl){

    const sync = ()=>{
      if(document.getElementById("sameAddress").checked){
        destEl.value = srcEl.value;
      }
    };

    srcEl.addEventListener("input", sync);
    srcEl.addEventListener("change", sync);
  }
});

// 👉 checkbox control
document.addEventListener("change", function(e){

  if(e.target.id === "sameAddress"){

    if(e.target.checked){

      copyAddressValues();

      // 🔒 lock permanent fields
      document.querySelectorAll('[name^="per"]').forEach(el=>{
        el.readOnly = true;
      });

    }else{

      clearAddressValues();

      // 🔓 unlock
      document.querySelectorAll('[name^="per"]').forEach(el=>{
        el.readOnly = false;
      });

    }

  }

});
async function fetchPincodeDetails(pincode, type="current"){

  if(pincode.length !== 6) return;

  try{

    const res = await fetch(`https://api.postalpincode.in/pincode/${pincode}`);
    const data = await res.json();

    if(data[0].Status === "Success"){

    const postList = data[0].PostOffice;

    let state = "";
    let district = "";
    let talukSet = new Set();

    postList.forEach(post => {
    state = post.State;
    district = post.District;

    if(post.Block){
        talukSet.add(post.Block);
    } else if(post.Name){
        talukSet.add(post.Name);
    }
    });

    // convert to array
    const taluks = [...talukSet];

    // pick best (first unique)
    const taluk = taluks[0] || "";


    const subEl = document.querySelector('[name="subdistrict"]');

    if(subEl.tagName === "INPUT"){
    const select = document.createElement("select");
    select.name = "subdistrict";

    taluks.forEach(t=>{
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        select.appendChild(opt);
    });

    subEl.replaceWith(select);
    }

      if(type === "current"){

        const stateDropdown = document.querySelector('[name="currentstate"]');
        [...stateDropdown.options].forEach(opt => {
        if(opt.value.trim().toLowerCase() === state.trim().toLowerCase()){
            opt.selected = true;
        }
        });
        document.querySelector('[name="currentdistrict"]').value = district;
        document.querySelector('[name="subdistrict"]').value = taluk;

        // ✅ same address auto sync
        if(document.getElementById("sameAddress")?.checked){

          const perStateDropdown = document.querySelector('[name="perstate"]');

        [...perStateDropdown.options].forEach(opt=>{
        if(opt.value.trim().toLowerCase() === state.trim().toLowerCase()){
            opt.selected = true;
        }
        });
          document.querySelector('[name="perdistrict"]').value = district;
          document.querySelector('[name="persubdistrict"]').value = taluk;

        }

      }else{

        const perStateDropdown = document.querySelector('[name="perstate"]');
        [...perStateDropdown.options].forEach(opt=>{
        if(opt.value.trim().toLowerCase() === state.trim().toLowerCase()){
            opt.selected = true;
        }
        });
        document.querySelector('[name="perdistrict"]').value = district;
        document.querySelector('[name="persubdistrict"]').value = taluk;


      }

    }else{
      alert("Invalid Pincode");
    }

  }catch(err){
    console.log("Pincode fetch error", err);
  }

}
