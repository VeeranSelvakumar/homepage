<!-- ===== COMPLAINT / QUERY FORM ===== -->
<style>
.helpdesk-form-wrapper{
  max-width:600px;
  margin:40px auto;
  background:#ffffff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.helpdesk-form-wrapper h2{
  text-align:center;
  color:#0d47a1;
  margin-bottom:10px;
}

.helpdesk-form-wrapper p{
  text-align:center;
  font-size:14px;
  color:#555;
  margin-bottom:20px;
}

.helpdesk-form label{
  display:block;
  margin-bottom:6px;
  font-weight:bold;
  color:#333;
}

.helpdesk-form input,
.helpdesk-form textarea{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:6px;
  margin-bottom:15px;
  font-size:14px;
}

.helpdesk-form textarea{
  resize:none;
  height:120px;
}

.helpdesk-form button{
  width:100%;
  background:#1a73e8;
  color:#fff;
  border:none;
  padding:12px;
  font-size:16px;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

.helpdesk-form button:hover{
  background:#0d47a1;
}

.note-text{
  margin-top:15px;
  font-size:13px;
  color:#666;
  text-align:center;
}
</style>

<div class="helpdesk-form-wrapper">

  <h2>📨 Feedback / Complaint Form</h2>
  <p>உங்கள் புகார்களை இங்கே பதிவு செய்யவும்</p>

  <form class="helpdesk-form"
        action="https://formsubmit.co/veerantechpoint@gmail.com"
        method="POST">

    <label>Full Name</label>
    <input type="text" name="Name" placeholder="உங்கள் பெயர்" required>

    <label>Mobile Number</label>
    <input type="tel" name="Mobile" placeholder="10 இலக்க மொபைல் எண்" pattern="[0-9]{10}" maxlength="10" required>
    

    <label>Email (Optional)</label>
    <input type="email" name="Email" placeholder="example@gmail.com">

    <label>Feedback / Complaint</label>
    <textarea name="Message" placeholder="உங்கள் கருத்து அல்லது புகார்" required></textarea>

    <!-- Hidden Settings -->
    <input type="hidden" name="_subject" value="New Complaint - Veeran Tech Point">
    <input type="hidden" name="_captcha" value="true">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_next" value="https://homepage-veeran-tech-point.vercel.app/index.html">
    <input type="hidden" name="Ticket ID" id="ticketID">
    

    <button type="submit">Submit Complaint</button>
  </form>

  <div class="note-text">
    ⏱ உங்கள் புகார் 24 மணி நேரத்திற்குள் பரிசீலிக்கப்படும்
  </div>

</div>
<script>
document.querySelector(".helpdesk-form").addEventListener("submit", function(){

    let id = "VTP-" + Math.floor(1000 + Math.random() * 9000);

    document.getElementById("ticketID").value = id;

    alert("உங்கள் Ticket ID: " + id);

});
</script>
<!-- ===== END FORM ===== -->
